<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeannou Tenzi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }

        h1 {
            color: #333;
        }

        img {
            width: 600px;
            max-width: 90%;
            height: auto;
            border-radius: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            margin: 20px 0;
        }

        button {
            padding: 12px 24px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #007BFF;
            color: white;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        .petit {
            padding: 6px 12px;
            font-size: 12px;
            margin : 5px;
        }

        div {
            margin: 20px;
        }
        input {
            margin: 20px;
        }
        ul {
            margin: 20px;
        }
        li {
            margin: 10px;
        }
    </style>
</head>
<body>

    
    <img id="randomImage" src="img/0.jpg" alt="Image aléatoire">

    <button onclick="nouvelleImage()">
        Nouvelle carte
    </button>
    <div>
            <input type="text" id="name" name="name" placeholder="Nom joueur.euse"/>
            <button class="petit" onclick="ajoutJoueureuse()">
                Ajouter joeur.euse
            </button>
    </div>
    <ul id="liste">
        
    </ul>
    
    <script>
        var listeJoeureuse = {}
        function nouvelleImage() {
            const img = document.getElementById("randomImage");
            img.src = "img/" + (Math.floor(Math.random() * 51) + 1) + ".jpg";
            console.log(img.src)
        }

        function ajoutJoueureuse() {
            const nom = document.getElementById("name").value;
            // listeJoeureuse += {[nom]: 0};
            listeJoeureuse[nom] = 0;
            console.log(nom)
            console.log(Object.keys(listeJoeureuse))
            console.log(Object.values(listeJoeureuse))
            
            var liste = document.getElementById("liste");
            liste.innerHTML += "<li>" + nom + "<span id=" + nom + "> 0 </span><button class=\"petit\" onclick=\"ajoutpoint(\'"+nom+"\')\"> +1 </button><button class=\"petit\" onclick=\"retirepoint(\'" + nom + "\')\"> -1 </button></li>";
            console.log(liste.innerHTML)
        }

        function ajoutpoint(x) {
            listeJoeureuse[x] += 1;
            console.log(listeJoeureuse[x])
            console.log(x)
            document.getElementById(x).innerHTML = listeJoeureuse[x];
            console.log(listeJoeureuse[x])
        }
        function retirepoint(nom) {
            listeJoeureuse[nom] += -1;
            document.getElementById(nom).innerHTML = listeJoeureuse[nom];
        }
    </script>

</body>
</html>
