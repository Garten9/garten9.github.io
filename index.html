<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image aléatoire</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }

        h1 {
            color: #333;
        }

        img {
            width: 600px;
            max-width: 90%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            margin: 20px 0;
        }

        button {
            padding: 12px 24px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #007BFF;
            color: white;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h1>Image aléatoire</h1>

    <img id="randomImage" src="img/0.jpg" alt="Image aléatoire">

    <button onclick="nouvelleImage()">
        Nouvelle image
    </button>

    <script>
        function nouvelleImage() {
            const img = document.getElementById("randomImage");
            img.src = "img/" + (Math.floor(Math.random() * 5) + 1) + ".png";
            console.log(img.src)
        }
    </script>

</body>
</html>
